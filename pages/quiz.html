<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">    
    <link rel="stylesheet" href="../css/style.css">
    <title>Music Match | Quiz</title>
</head>
<body>

    <div id="add-collection-modal" class="modal-overlay">
        <div class="modal-content">
            <img src="../images/icons/close.png" alt="close-icon" id="add-close-btn" class="close-trigger">
            <h2>nieuwe collectie</h2>
            <h3>naam</h3>
            <input type="text" id="collection-input">

            <span class="error"></span>

            <div class="button-container">
                <button type="button" id="add-cancel-btn" class="close-trigger">annuleer</button>
                <button type="button" id="add-save-btn">bewaar</button>
            </div>
        </div>
    </div>

    <div id="quiz-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="modal-title">ben je er klaar voor?</h2>
            <p id="modal-text">luister naar de clip en probeer de artiest te raden!</p>
            <div class="button-container">
                <button type="button" id="quiz-start-btn">start quiz</button>
                <button type="button" id="quiz-cancel-btn" class="close-trigger">annuleer</button>
            </div>
        </div>
    </div>

    <div id="countdown-container">
        <div>
             <h1 id="countdown">3</h1>
        </div>
    </div>

    <div class="container">
        <nav>
            <a href="home.html">
                <div class="logo">
                    <img src="../images/icons/logo.png" alt="Logo">
                    <h1>music match</h1>
                </div>
            </a>

           <ul class="nav-list">

                <li class="active">
                    <a href="quiz.html" id="quiz-nav-item">
                        <span class="nav-label">quiz</span>
                    </a>
                </li>

                <li>
                    <a href="generate.html">
                        <span class="nav-label">genereer</span>
                    </a>
                </li>

                <li>
                    <a href="compare.html">
                        <span class="nav-label">vergelijken</span>
                    </a>
                </li>

                <div class="collection-container">
                    <div class="nav-collection-header">
                        <span>collecties</span>
                        <button id="add-collection-btn">+</button>
                    </div>

                   <ul class="nav-collection-list">
                        <li>
                            <a href="collections.html">
                                <img src="../images/icons/collections.png" alt="collections icon" class="nav-icon">
                                <span class="nav-label">Alle collecties</span>
                            </a>
                        </li>

                        <li>
                            <a href="library.html">
                                <img src="../images/icons/likes.png" alt="likes icon" class="nav-icon">
                                <span class="nav-label">Likes</span>
                            </a>
                        </li>
                       
                   </ul>

                   <ul class="nav-collection-items">

                   </ul>
                </div>

           </ul>
        </nav>

        <main class="main">

            <header>
                <div class="header-center">
                    <a href="home.html">
                        <div class="home-btn" class="home-btn-inactive"><img src="../images/icons/home-inactive.png" alt="home icon"></div>
                    </a>
                    <input type="search" class="search" placeholder="Search">
                </div>

                <a href="profile.html">
                    <div class="profile-btn"><img src="../images/default_profile.jpg" alt="profile icon" id="header-user-photo"></div>
                </a>
            </header>

            <section class="quiz">
                <div class="quiz-header">
                    <div>
                        <h2 class="section-title">quiz</h2>
                        <p>Welk artiest is dit?</p>
                    </div>
                    

                    <div class="score-container">
                        <div> <img src="../images/icons/round.png" alt="Ronde icoon"> Ronde <span id="ronde"> 1/5</span></div>
                        <div> <img src="../images/icons/score.png" alt="Score icoon"> Score <span id="score">0</span></div>
                    </div>
                   
                </div>
               
                <div class="quiz-container">
                    <div class="blurred-cover">
                         <img src="../images/covers/default-quiz.png" alt="">
                    </div>
                   
                    <div class="button-container">
                        <button class="quiz-option"> <div>A</div></button>
                        <button class="quiz-option"> <div>B</div></button>
                        <button class="quiz-option"> <div>C</div></button>
                        <button class="quiz-option"> <div>D</div></button>
                    </div>
                </div>

                <div class="timer-container">
                    
                    <div class="timer-content">
                        <img src="../images/icons/timer.png" alt="">
                        <div>
                            <span id="timer">10 seconden</span>
                            <p>resterende tijd</p>
                        </div>
                    </div>

                    <div class="skip">
                        <p>overslaan</p>
                        <img src="../images/icons/skip.png" alt="">
                    </div>
                </div>
                    
            </section>
        </main>
    </div>

    <script type="module" src="../js/app.js"></script>
    <script type="module" src="../js/auth.js"></script>
    <script type="module" src="../js/collection.js"></script>
    <script type="module" src="../js/quiz.js"></script>
    <script type="module" src="../js/profile.js"></script>
</body>
</html>
