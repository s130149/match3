<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/compare.css">
    <title>vergelijk</title>
</head>

<body>
    <div class="container">
        <nav>
            <a href="home.html">
                <div class="logo">
                    <img src="../images/icons/logo.png" alt="Logo">
                    <h1>music match</h1>
                </div>
            </a>

           <ul class="nav-list">

                <li>
                    <a href="quiz.html" id="quiz-nav-item">
                        <span class="nav-label">quiz</span>
                    </a>
                </li>

                <li>
                    <a href="generate.html">
                        <span class="nav-label">genereer</span>
                    </a>
                </li>

                <li>
                    <a href="compare.html">
                        <span class="nav-label">vergelijken</span>
                    </a>
                </li>

                <div class="collection-container">
                    <div class="nav-collection-header">
                        <span>collecties</span>
                        <button id="add-collection-btn">+</button>
                    </div>

                   <ul class="nav-collection-list">
                        <li>
                            <a href="collections.html">
                                <img src="../images/icons/collections.png" alt="collections icon" class="nav-icon">
                                <span class="nav-label">Alle collecties</span>
                            </a>
                        </li>

                        <li>
                            <a href="library.html">
                                <img src="../images/icons/likes.png" alt="likes icon" class="nav-icon">
                                <span class="nav-label">Likes</span>
                            </a>
                        </li>
                       
                   </ul>

                   <ul class="nav-collection-items">

                   </ul>
                </div>

           </ul>
        </nav>

        <main class="main">
            <header>
                <div class="header-center">
                    <a href="home.html">
                        <div class="home-btn" class="home-btn-inactive"><img src="../images/icons/home-inactive.png" alt="home icon"></div>
                    </a>
                    <input type="search" class="search" placeholder="Search">
                </div>

                <a href="profile.html">
                    <div class="profile-btn"><img src="../images/default_profile.jpg" alt="profile icon" id="header-user-photo"></div>
                </a>
            </header>

            <section class="vergelijking-grid">
                <button class="toevoegen" onclick="openModal(0)">
                    <div class="plus-cirkel">
                        <span class="plus-icoon">+</span>
                    </div>
                    <p>artiest / liedje toevoegen</p>
                </button>

                <button class="toevoegen" onclick="openModal(1)">

                    <div class="plus-cirkel">
                        <span class="plus-icoon">+</span>
                    </div>
                    <p>artiest / liedje toevoegen</p>
                </button>
            </section>
        </main>
    </div>

    <div id="modal-overlay" class="modal-overlay" style="display: none;">
  <div class="modal">
    <div class="modal-header">
      <p>Zoek een liedje</p>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <input id="modal-search" type="search" placeholder="Zoeken..." oninput="filterSongs(this.value)">
        <div id="song-list"></div>
        </div>
    </div>

    <script type="module" src="../js/app.js"></script>
    <script type="module" src="../js/auth.js"></script>
    <script src="../js/compare.js"></script>
</body>
</html>
