<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <title>Collecties</title>
</head>

<body>

    <div id="add-collection-modal" class="modal-overlay">
        <div class="modal-content">
            <img src="../images/icons/close.png" alt="close-icon" id="add-close-btn" class="close-trigger">
            <form action="" id="collection-form">
                <h2>nieuwe collectie</h2>
                <h3>collectie naam</h3>
                <input type="text" id="collection-input">
            </form>

            <span class="error"></span>

            <div class="button-container">
                <button id="add-cancel-btn" class="close-trigger">annuleer</button>
                <button type="submit" form="collection-form" id="add-save-btn">bewaar</button>
            </div>
        </div>
    </div>

    <div class="container">
        <header>
            <a href="home.html">
                <div class="logo">
                    <img src="../images/icons/logo.png" alt="Logo">
                    <h1>music match</h1>
                </div>
            </a>

            <div class="header-center">
                <a href="home.html">
                    <div class="home-btn" class="home-btn-inactive"><img src="../images/icons/home-inactive.png" alt="home icon"></div>
                </a>
                <input type="search" class="search" placeholder="Search">
            </div>

            <a href="profile.html">
                <div class="profile-btn"><img src="../images/covers/default_profile.jpg" alt="profile icon" id="header-user-photo" class="user-photo"></div>
            </a>
        </header>

       <nav>
           <ul class="nav-list">

                <li>
                    <a href="quiz.html" id="quiz-nav-item">
                        <span class="nav-label">quiz</span>
                    </a>
                </li>

                <li>
                    <a href="generate.html">
                        <span class="nav-label">mood</span>
                    </a>
                </li>

                <li>
                    <a href="compare.html">
                        <span class="nav-label">match</span>
                    </a>
                </li>

                <div class="collection-container">
                    <div class="nav-collection-header">
                        <span>collecties</span>
                        <button id="add-collection-btn">+</button>
                    </div>

                   <ul class="nav-collection-list">
                        <li>
                            <a href="collections.html">
                                <img src="../images/icons/collections.png" alt="collections icon" class="nav-icon">
                                <span class="nav-label active">Alle collecties</span>
                            </a>
                        </li>

                        <li>
                            <a href="likes.html">
                                <img src="../images/icons/likes.png" alt="likes icon" class="nav-icon">
                                <span class="nav-label">Likes</span>
                            </a>
                        </li>
                       
                   </ul>

                   <ul class="nav-collection-items">

                   </ul>
                </div>

           </ul>
        </nav>

        <main>

            <h2 class="section-title">afspeellijsten</h2>

            <section class="collections">
                <div class="main-collection-items">
                    <a href="likes.html" class="card card--likes" id="collection-likes">
                        <img src="../images/covers/likes-cover.png" alt="">
                        <div class="card-content">
                            <h3>gelikte liedjes</h3>
                        </div>
                    </a>
                </div>
            </section>  
        </main>

        <script type="module" src="../js/app.js"></script>
</body>
</html>
