<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">    
    <link rel="stylesheet" href="../css/style.css">
    <title>Profiel</title>
</head>
<body>

    <!-- Overlays -->

    <div id="add-collection-modal" class="modal-overlay">
        <div class="modal-content">
            <img src="../images/icons/close.png" alt="close-icon" id="add-close-btn" class="close-trigger">
            <form action="" id="collection-form">
                <h2>nieuwe collectie</h2>
                <h3>naam</h3>
                <input type="text" id="collection-input">
            </form>

            <span class="error"></span>

            <div class="button-container">
                <button id="cancel-btn" class="close-trigger">Annuleer</button>
                <button type="submit" form="collection-form" id="add-save-btn">Bewaar</button>
            </div>
        </div>
    </div>

    <aside id="detail-container">
        <div class="detail-card">
            <img src="../images/covers/blank-cover.jpg" id="cover">

            <div class="detail-info">
                <div class="title-wrapper">
                     <h2 id="title">Titel</h2>
                </div>
               
                <p id="artist">Artiest</p>

                <div class="detail-btn-wrapper">
                    <button id="like-btn">
                        <img src="../images/icons/not-liked.png" alt="like">
                    </button>
                    <button id="add-to-collection-btn">
                        <img src="../images/icons/add-to-collection.png" alt="add">
                    </button>
                </div>
               
            </div>
            
            <div id="lyrics-container">
                <div id="lyrics-header">
                    <p id="lyrics-title">Lyrics</p>
                </div>
                
                <div id="lyrics-text">

                </div>
            </div>
        </div>
    </aside>

    <div class="playback-bar">
        <input type="range" id="progress-bar" min="0" max="100" value="0">
    </div>

    <div id="player-container" class="spotify-player">
        <div class="player-info">
            <img id="player-img" src="../images/covers/default-playing-img.png" alt="">
            <div>
            <h4 id="player-title"></h4>
            <p id="player-artist"></p>
            </div>
        </div>

        <div class="player-controls">
            <button id="prev-btn" class="control-btn">
                <img src="../images/icons/previous.png" alt="previous">
            </button>
            <button id="play-pause-btn" class="control-btn">
                <img src="../images/icons/play.png" alt="play">
            </button>
            <button id="next-btn" class="control-btn">
                <img src="../images/icons/next.png" alt="next">
            </button>
        </div>

        <div class="volume-container">
            <img src="../images/icons/volume.png" alt="volume" id="volume">
            <input type="range" id="volume-slider" min="0" max="100" value="50">
        </div>
    </div>

    <div class="mobile-nav">
        <a href="home.html" class="active">
            <img src="../images/icons/home.png" alt="">
            <span>Home</span>
        </a>
        <a href="home.html">
            <img src="../images/icons/quiz.png" alt="">
            <span>Quiz</span>
        </a>
        <a href="home.html">
            <img src="../images/icons/generate.png" alt="">
            <span>Genereer</span>
        </a>
        <a href="home.html">
            <img src="../images/icons/compare.png" alt="">
            <span>Vergelijk</span>
        </a>
        <a href="home.html">
            <img src="../images/icons/collections.png" alt="">
            <span>Collecties</span>
        </a>
    </div>

    <!-- Main Content -->

    <div class="container">
        <header>
            <a href="home.html">
                <div class="logo">
                    <img src="../images/icons/logo.png" alt="Logo">
                    <h1>music match</h1>
                </div>
            </a>

            <div class="header-center">
                <a href="home.html">
                    <div class="home-btn" class="home-btn-inactive"><img src="../images/icons/home-inactive.png" alt="home icon"></div>
                </a>
                <input type="search" class="search" placeholder="Search">
            </div>

            <a href="profile.html">
                <div class="profile-btn"><img src="../images/covers/default_profile.jpg" alt="profile icon" id="header-user-photo" class="user-photo"></div>
            </a>
        </header>

        <nav>
           <ul class="nav-list">

                <li>
                    <a href="quiz.html" id="quiz-nav-item">
                        <span class="nav-label">quiz</span>
                    </a>
                </li>

                <li>
                    <a href="generate.html">
                        <span class="nav-label">mood</span>
                    </a>
                </li>

                <li>
                    <a href="compare.html">
                        <span class="nav-label">match</span>
                    </a>
                </li>

                <div class="collection-container">
                    <div class="nav-collection-header">
                        <span>collecties</span>
                        <button id="add-collection-btn" class="requires-spotify">+</button>
                    </div>

                   <ul class="nav-collection-list">
                        <li>
                            <a href="collections.html">
                                <img src="../images/icons/collections.png" alt="collections icon" class="nav-icon">
                                <span class="nav-label">Alle collecties</span>
                            </a>
                        </li>

                        <li>
                            <a href="likes.html">
                                <img src="../images/icons/likes.png" alt="likes icon" class="nav-icon">
                                <span class="nav-label">Likes</span>
                            </a>
                        </li>
                       
                   </ul>

                   <ul class="nav-collection-items">

                   </ul>
                </div>

           </ul>
        </nav>

        <main id="profile">

            <section id="profile-header">
                <img src="../images/covers/default_profile.jpg" alt="Profiel foto" id="profile-user-photo" class="user-photo">
                <div id="profile-header-content">
                    <h1 class="username"></h1>

                    <div id="followers-container">
                        <p><span id="followers-count">0</span> volgers</p>
                        <p>• </p>
                        <p><span id="following-count">0</span> volgend</p>
                    </div>
                 
                </div>
            </section>

            <h2 class="section-title">je top nummers</h2>

            <section id="recent-tracks-container" class="song-container">

                <div class="card card--recent-track song-card">
                    <img src="" alt="">
                    <div class="card-content">
                        <h3></h3>
                    </div>
                     <button class="play-card-btn">
                        <img src="../images/icons/play-card-btn.png" alt="play">
                    </button>
                </div>

                <div class="card card--recent-track song-card">
                    <img src="" alt="">
                    <div class="card-content">
                        <h3></h3>
                    </div>
                     <button class="play-card-btn">
                        <img src="../images/icons/play-card-btn.png" alt="play">
                    </button>
                </div>

                <div class="card card--recent-track song-card">
                    <img src="" alt="">
                    <div class="card-content">
                        <h3></h3>
                    </div>
                     <button class="play-card-btn">
                        <img src="../images/icons/play-card-btn.png" alt="play">
                    </button>
                </div>

                <div class="card card--recent-track song-card">
                    <img src="" alt="">
                    <div class="card-content">
                        <h3></h3>
                    </div>
                     <button class="play-card-btn">
                        <img src="../images/icons/play-card-btn.png" alt="play">
                    </button>
                </div>

            </section>

            <h2 class="section-title">artiesten die je volgt</h2>

            <section id="followed-artists-container" class="artists">
                <div class="card card--followed-artist">
                    <img src="../images/covers/default_profile.jpg" alt="artist">
                    <div class="card-content">
                        <h3>artiest naam </h3> 
                    </div>
                </div>
                <button class="card card--followed-artist">
                    <img src="../images/covers/default_profile.jpg" alt="artist">
                    <div class="card-content">
                        <h3>artiest naam </h3> 
                    </div>
                </button>
                <button class="card card--followed-artist">
                    <img src="../images/covers/default_profile.jpg" alt="artist">
                    <div class="card-content">
                        <h3>artiest naam </h3> 
                    </div>
                </button>
                <button class="card card--followed-artist">
                    <img src="../images/covers/default_profile.jpg" alt="artist">
                    <div class="card-content">
                        <h3>artiest naam </h3> 
                    </div>
                </button>
                <button class="card card--followed-artist">
                    <img src="../images/covers/default_profile.jpg" alt="artist">
                    <div class="card-content">
                        <h3>artiest naam </h3> 
                    </div>
                </button>
                <button class="card card--followed-artist">
                    <img src="../images/covers/default_profile.jpg" alt="artist">
                    <div class="card-content">
                        <h3>artiest naam </h3> 
                    </div>
                </button>
            </section>

        </main>
    </div>
    
    <script type="module" src="../js/profile.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
    <script src="https://sdk.scdn.co/spotify-player.js"></script>
</body>
</html>
