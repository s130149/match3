<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet"> 
    <link rel="icon" type="image/png" href="../images/icons/logo.png">   
    <link rel="stylesheet" href="../css/style.css">
    <title>Music Match | Likes</title>
</head>
<body>

    <div id="add-collection-modal" class="modal-overlay">
        <div class="modal-content">
            <img src="../images/icons/close.png" alt="close-icon" id="add-close-btn" class="close-trigger">
            <h2>nieuwe collectie</h2>
            <h3>naam</h3>
            <input type="text" id="collection-input">

            <span class="error"></span>

            <div class="button-container">
                <button type="button" id="add-cancel-btn" class="close-trigger">annuleer</button>
                <button type="button" id="add-save-btn">bewaar</button>
            </div>
        </div>
    </div>

    <div id="quiz-modal" class="modal-overlay">
        <div class="modal-content">
            <h2>ben je er klaar voor?</h2>
            <p>luister naar de clip en probeer de artiest te raden!</p>
            <div class="button-container">
                <button type="button" id="quiz-start-btn">start quiz</button>
                <button type="button" id="quiz-cancel-btn" class="close-trigger">annuleer</button>
            </div>
        </div>
    </div>

    <div class="container"> 
        <nav>
            <a href="home.html">
                <div class="logo">
                    <img src="../images/icons/logo.png" alt="Logo">
                    <h1>music match</h1>
                </div>
            </a>

           <ul class="nav-list">

                <li>
                    <a href="#" id="quiz-nav-item">
                        <span class="nav-label">quiz</span>
                    </a>
                </li>

                <li>
                    <a href="generate.html">
                        <span class="nav-label">genereer</span>
                    </a>
                </li>

                <li>
                    <a href="compare.html">
                        <span class="nav-label">vergelijken</span>
                    </a>
                </li>

                <div class="collection-container">
                    <div class="nav-collection-header">
                        <span>collecties</span>
                        <button id="add-collection-btn">+</button>
                    </div>

                   <ul class="nav-collection-list">
                        <li>
                            <a href="collections.html">
                                <img src="../images/icons/collections.png" alt="collections icon" class="nav-icon">
                                <span class="nav-label">Alle collecties</span>
                            </a>
                        </li>

                        <li>
                            <a href="library.html" class="active">
                                <img src="../images/icons/likes.png" alt="likes icon" class="nav-icon">
                                <span class="nav-label">Likes</span>
                            </a>
                        </li>
                       
                   </ul>

                   <ul class="nav-collection-items">

                   </ul>
                </div>

           </ul>
        </nav>

        <main class="main">

            <header>
                <div class="header-center">
                    <a href="home.html">
                        <div class="home-btn" class="home-btn-inactive"><img src="../images/icons/home-inactive.png" alt="home icon"></div>
                    </a>
                    <input type="search" class="search" placeholder="Search">
                </div>

                <a href="profile.html">
                    <div class="profile-btn"><img src="../images/default_profile.jpg" alt="profile icon" id="header-user-photo"></div>
                </a>
            </header>

            <section class="main-collection-header">
                <img src="https://misc.scdn.co/liked-songs/liked-songs-300.png" alt="">

                <div class="main-collection-wrapper">
                    <h1 id="collection-title">likes</h1>

                </div>
 
            </section>

            <section class="main-collection-content">
                <img src="../images/icons/musical-note.png" alt="">
                <p>Je hebt nog geen liedjes toegevoegd</p>
            </section>

        </main>
    </div>
    
    <script type="module" src="../js/app.js"></script>
    <script type="module" src="../js/auth.js"></script>
    <script type="module" src="../js/collection.js"></script>
    <script type="module" src="../js/collection-details.js"></script>
    <script type="module" src="../js/search.js"></script>
    <script type="module" src="../js/profile.js"></script>
</body>
</html>
